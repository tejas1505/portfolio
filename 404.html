<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tejas Chavan — Portfolio</title>
  <!-- SPA redirect: preserves the path so React Router works on GH Pages -->
  <script>
    // SPA redirect for GitHub Pages with a sub-path base (e.g. /portfolio/)
    // Strips the repo prefix then encodes remaining path as query param
    var l = window.location;
    var base = '/portfolio'; // must match vite.config.ts `base` (no trailing slash)
    var path = l.pathname.startsWith(base) ? l.pathname.slice(base.length) : l.pathname;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      base + '/?p=' + encodeURIComponent(path.slice(1) + l.search) +
      (l.hash || '')
    );
  </script>
</head>
<body>Redirecting...</body>
</html>
